{% extends "sa_base.html" %}

{% block title %}Lojas{% endblock %}
{% block header_title %}Gerenciar Lojas (Tenants){% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div class="max-w-md w-full relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input type="text" id="filtro-nome" placeholder="Buscar loja..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all text-sm" onkeyup="renderTable()">
    </div>
    <button onclick="abrirModal()" class="flex items-center px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl shadow-sm transition-all focus:ring-4 focus:ring-slate-200 active:scale-[0.98] text-sm">
        <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Nova Loja
    </button>
</div>

<!-- Table -->
<div class="bg-white border border-slate-200 shadow-sm rounded-2xl overflow-hidden">
    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider">
                    <th class="px-6 py-4 font-semibold">Loja / Info</th>
                    <th class="px-6 py-4 font-semibold">Plano</th>
                    <th class="px-6 py-4 font-semibold">Status</th>
                    <th class="px-6 py-4 font-semibold">Entrada</th>
                    <th class="px-6 py-4 font-semibold text-right">Ações</th>
                </tr>
            </thead>
            <tbody id="tabela-body" class="divide-y divide-slate-100/80">
                <tr><td colspan="5" class="px-6 py-8 text-center text-slate-400">Carregando...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<!-- Modal fora do bloco content para evitar interferência do containing block -->
<div id="modal-form" class="fixed inset-0 z-50 hidden" aria-modal="true" role="dialog">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="fecharModal()"></div>
    <!-- Caixa centralizada -->
    <div class="relative flex items-center justify-center w-full h-full p-4 pointer-events-none">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl pointer-events-auto flex flex-col" style="max-height: 90vh;">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h3 class="text-lg font-semibold text-slate-800" id="modal-title">Nova Loja</h3>
                <button onclick="fecharModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-100">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Body com scroll -->
            <div class="overflow-y-auto flex-1">
                <form id="form-loja" class="p-6 space-y-4" onsubmit="event.preventDefault(); salvarLoja();">
                    <input type="hidden" id="loja_id">

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="nome">Nome Comercial</label>
                        <input type="text" id="nome" required class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1" for="cnpj">CNPJ / CPF</label>
                            <input type="text" id="cnpj" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1" for="telefone">Telefone</label>
                            <input type="text" id="telefone" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="email">E-mail de Contato</label>
                        <input type="email" id="email" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1" for="plano_id">Plano</label>
                            <select id="plano_id" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                                <!-- populado via JS -->
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1" for="status">Status</label>
                            <select id="status" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                                <option value="ATIVO">Ativo</option>
                                <option value="SUSPENSO">Suspenso</option>
                                <option value="CANCELADO">Cancelado</option>
                            </select>
                        </div>
                    </div>

                    <div class="pt-4 flex justify-end gap-3 border-t border-slate-100">
                        <button type="button" onclick="fecharModal()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition-colors text-sm">Cancelar</button>
                        <button type="submit" id="btn-salvar" class="flex items-center px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-500 transition-colors shadow-md shadow-blue-500/30 text-sm disabled:opacity-50 disabled:cursor-not-allowed">
                            <span id="btn-text">Salvar Loja</span>
                            <div id="btn-loader" class="hidden ml-2 w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    let lojas = [];
    let planos = [];

    document.addEventListener("DOMContentLoaded", () => {
        carregarDados();
    });

    async function carregarDados() {
        try {
            const [resL, resP] = await Promise.all([
                fetch('/api/tenants'),
                fetch('/api/planos')
            ]);
            lojas = await resL.json();
            planos = await resP.json();

            document.getElementById('plano_id').innerHTML =
                `<option value="">Sem plano</option>` +
                planos.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');

            renderTable();
        } catch (e) {
            console.error(e);
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tabela-body');
        const q = document.getElementById('filtro-nome').value.toLowerCase();
        const views = lojas.filter(l => l.nome.toLowerCase().includes(q));

        if (views.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">Nenhuma loja encontrada.</td></tr>`;
            return;
        }

        tbody.innerHTML = views.map(t => {
            const stColor = t.status === 'ATIVO' ? 'bg-emerald-100 text-emerald-800' :
                            t.status === 'SUSPENSO' ? 'bg-amber-100 text-amber-800' : 'bg-red-100 text-red-800';
            return `
                <tr class="hover:bg-slate-50 transition-colors group">
                    <td class="px-6 py-4">
                        <p class="font-medium text-slate-800">${t.nome}</p>
                        <p class="text-xs text-slate-500 mt-0.5">${t.cnpj || '—'} | ${t.email || '—'}</p>
                    </td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 bg-slate-100 text-slate-700 rounded-md border border-slate-200 text-sm font-medium">
                            ${t.plano_nome || 'Nenhum'}
                        </span>
                    </td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold ${stColor}">
                            ${t.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-500 text-sm">${t.criado_em}</td>
                    <td class="px-6 py-4 text-right flex justify-end gap-2">
                        <button onclick='editar(${JSON.stringify(t).replace(/'/g, "&#39;")})' class="p-1.5 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Editar">
                            <i data-lucide="edit-2" class="w-4 h-4"></i>
                        </button>
                        <button onclick="excluirLoja(${t.id}, '${t.nome}')" class="p-1.5 text-slate-400 hover:text-red-600 hover:bg-red-50 rounded-lg transition-colors opacity-0 group-hover:opacity-100" title="Excluir">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </td>
                </tr>`;
        }).join('');
        lucide.createIcons();
    }

    const modal = document.getElementById('modal-form');
    const modalContent = document.getElementById('modal-content');

    function abrirModal() {
        document.getElementById('form-loja').reset();
        document.getElementById('loja_id').value = '';
        document.getElementById('modal-title').textContent = 'Nova Loja';
        modal.classList.remove('hidden');
        lucide.createIcons();
    }

    function fecharModal() {
        modal.classList.add('hidden');
    }

    function editar(t) {
        document.getElementById('loja_id').value = t.id;
        document.getElementById('nome').value = t.nome;
        document.getElementById('cnpj').value = t.cnpj || '';
        document.getElementById('email').value = t.email || '';
        document.getElementById('telefone').value = t.telefone || '';
        document.getElementById('plano_id').value = t.plano_id || '';
        document.getElementById('status').value = t.status || 'ATIVO';
        document.getElementById('modal-title').textContent = 'Editar Loja';
        modal.classList.remove('hidden');
        lucide.createIcons();
    }

    async function salvarLoja() {
        const btn = document.getElementById('btn-salvar');
        const loader = document.getElementById('btn-loader');
        const text = document.getElementById('btn-text');

        const id = document.getElementById('loja_id').value;
        const d = {
            nome: document.getElementById('nome').value,
            cnpj: document.getElementById('cnpj').value,
            email: document.getElementById('email').value,
            telefone: document.getElementById('telefone').value,
            plano_id: document.getElementById('plano_id').value || null,
            status: document.getElementById('status').value
        };

        const url = id ? `/api/tenants/${id}` : '/api/tenants';
        const method = id ? 'PUT' : 'POST';

        try {
            btn.disabled = true;
            loader.classList.remove('hidden');
            text.textContent = 'Salvando...';

            const res = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(d)
            });
            const result = await res.json();

            if (res.ok && result.ok) {
                showToast(id ? 'Loja atualizada com sucesso!' : 'Loja criada com sucesso!');
                fecharModal();
                await carregarDados();
            } else {
                showToast(result.message || 'Erro ao salvar loja', 'error');
            }
        } catch (e) {
            console.error(e);
            showToast('Erro de conexão ou no servidor', 'error');
        } finally {
            btn.disabled = false;
            loader.classList.add('hidden');
            text.textContent = 'Salvar Loja';
        }
    }

    async function excluirLoja(id, nome) {
        const confirmacao = prompt(`⚠️ ATENÇÃO: Deseja realmente excluir a loja "${nome}"?\n\nIsso apagará TODOS os dados vinculados permanentemente!\n\nPara confirmar, digite o nome da loja abaixo:`);
        if (!confirmacao) return;
        if (confirmacao.trim().toLowerCase() !== nome.trim().toLowerCase()) {
            alert('Confirmação inválida. O nome digitado não corresponde ao nome da loja.');
            return;
        }
        try {
            const res = await fetch(`/api/tenants/${id}`, { method: 'DELETE' });
            if (res.ok) {
                carregarDados();
            } else {
                alert('Erro ao excluir loja');
            }
        } catch (e) { console.error(e); }
    }
</script>
{% endblock %}
