<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Super Admin</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                }
            }
        }
    </script>
    <style>
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 140px;
            height: 140px;
            margin-bottom: 2rem;
            margin-left: auto;
            margin-right: auto;
            position: relative;
        }

        .logo-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
    </style>
</head>

<body
    class="bg-slate-900 h-screen flex items-center justify-center font-sans antialiased bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="w-full max-w-md">
        <!-- Logo/Header -->
        <div class="text-center mb-8">
            <div class="logo">
                <div class="logo-icon">
                    <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo"
                        onerror="this.src='/static/img/logo.png'">
                </div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Super Admin</h1>
                <p class="text-slate-400 mt-2">Painel Multi-Tenant</p>
            </div>

            <!-- Form Card -->
            <div class="bg-slate-800/50 backdrop-blur-xl border border-slate-700/50 rounded-2xl shadow-2xl p-8">
                <div id="error-msg"
                    class="hidden mb-6 p-3 bg-red-500/10 border border-red-500/20 text-red-400 text-sm rounded-lg text-center font-medium">
                </div>

                <form id="login-form" class="space-y-5" onsubmit="event.preventDefault(); doLogin();">
                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5" for="login">Login</label>
                        <input type="text" id="login" required
                            class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 text-white rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all placeholder:text-slate-500"
                            placeholder="Ex: superadmin">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-300 mb-1.5" for="senha">Senha</label>
                        <input type="password" id="senha" required
                            class="w-full px-4 py-3 bg-slate-900/50 border border-slate-700 text-white rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all placeholder:text-slate-500"
                            placeholder="••••••••">
                    </div>

                    <button type="submit" id="btn-submit"
                        class="w-full py-3 px-4 bg-blue-600 hover:bg-blue-500 text-white font-medium rounded-xl shadow-lg shadow-blue-500/25 transition-all focus:ring-4 focus:ring-blue-500/20 active:scale-[0.98] flex items-center justify-center">
                        <span>Entrar no Painel</span>
                    </button>
                </form>
            </div>

            <p class="text-center text-slate-500 text-xs mt-8 font-medium">
                &copy; 2026 LojaUp. Acesso Restrito.
            </p>
        </div>

        <script>
            async function doLogin() {
                const btn = document.getElementById('btn-submit');
                const err = document.getElementById('error-msg');
                const login = document.getElementById('login').value;
                const senha = document.getElementById('senha').value;

                btn.disabled = true;
                btn.innerHTML = `<svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>`;
                err.classList.add('hidden');

                try {
                    const res = await fetch('/api/auth/login', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ login, senha })
                    });
                    const data = await res.json();

                    if (data.ok) {
                        window.location.href = '/';
                    } else {
                        err.textContent = data.message || 'Erro ao logar';
                        err.classList.remove('hidden');
                        btn.disabled = false;
                        btn.innerHTML = '<span>Entrar no Painel</span>';
                    }
                } catch (e) {
                    err.textContent = 'Erro de conexão no servidor';
                    err.classList.remove('hidden');
                    btn.disabled = false;
                    btn.innerHTML = '<span>Entrar no Painel</span>';
                }
            }
        </script>
</body>

</html>
