{% extends "sa_base.html" %}
{% block title %}Contatos{% endblock %}
{% block header_title %}Contatos da Landing Page{% endblock %}

{% block content %}
<!-- Filtros + ações -->
<div class="flex flex-wrap items-center justify-between gap-4 mb-6">
  <div class="flex items-center gap-2 flex-wrap">
    <button onclick="filtrar('')"       id="f-todos"      class="filtro-btn active">Todos</button>
    <button onclick="filtrar('NOVO')"   id="f-novo"       class="filtro-btn">Novos</button>
    <button onclick="filtrar('CONTATADO')" id="f-contatado" class="filtro-btn">Contatados</button>
    <button onclick="filtrar('FECHADO')" id="f-fechado"   class="filtro-btn">Fechados</button>
    <button onclick="filtrar('DESCARTADO')" id="f-descartado" class="filtro-btn">Descartados</button>
  </div>
  <span id="total-badge" class="text-sm text-slate-500"></span>
</div>

<!-- Tabela -->
<div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
  <table class="w-full text-sm">
    <thead>
      <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 uppercase text-xs tracking-wide">
        <th class="px-5 py-3 text-left">Contato</th>
        <th class="px-5 py-3 text-left">Empresa</th>
        <th class="px-5 py-3 text-left">Plano</th>
        <th class="px-5 py-3 text-left">Data</th>
        <th class="px-5 py-3 text-left">Status</th>
        <th class="px-5 py-3 text-right">Ações</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty-state" class="hidden flex flex-col items-center justify-center py-16 text-slate-400">
    <i data-lucide="inbox" class="w-12 h-12 mb-3 opacity-30"></i>
    <p class="font-medium">Nenhum contato encontrado</p>
  </div>
</div>

<style>
  .filtro-btn {
    padding: 6px 14px; border-radius: 9999px; font-size: 13px; font-weight: 500;
    border: 1px solid #e2e8f0; color: #64748b; background: #fff;
    cursor: pointer; transition: all .15s;
  }
  .filtro-btn:hover { background: #f1f5f9; }
  .filtro-btn.active { background: #1e40af; color: #fff; border-color: #1e40af; }

  .status-badge {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 9999px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: .04em;
  }
  .s-novo       { background:#eff6ff; color:#1d4ed8; }
  .s-contatado  { background:#f0fdf4; color:#15803d; }
  .s-fechado    { background:#faf5ff; color:#7c3aed; }
  .s-descartado { background:#fef2f2; color:#b91c1c; }
</style>
{% endblock %}

{% block scripts %}
<!-- Modal fora do bloco content para evitar interferência do containing block -->
<div id="modal" class="fixed inset-0 z-50 hidden" aria-modal="true" role="dialog">
    <!-- Overlay -->
    <div class="absolute inset-0 bg-slate-900/50 backdrop-blur-sm" onclick="closeModal()"></div>
    
    <!-- Caixa centralizada -->
    <div class="relative flex items-center justify-center w-full h-full p-4 pointer-events-none">
        <div id="modal-content" class="bg-white w-full max-w-lg rounded-2xl shadow-2xl pointer-events-auto flex flex-col" style="max-height: 90vh;">
            <!-- Header -->
            <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h3 class="text-base font-semibold text-slate-800">Detalhes do Contato</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-100">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>

            <!-- Body com scroll -->
            <div class="overflow-y-auto flex-1 p-6">
                <div id="modal-body" class="space-y-4 text-sm text-slate-700"></div>
                
                <!-- Rodapé de Ações -->
                <div class="mt-6 pt-6 border-t border-slate-100 flex items-center justify-between gap-3">
                    <div class="flex gap-2">
                        <select id="modal-status" onchange="salvarStatus()" class="text-xs border border-slate-200 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
                            <option value="NOVO">Novo</option>
                            <option value="CONTATADO">Contatado</option>
                            <option value="FECHADO">Fechado</option>
                            <option value="DESCARTADO">Descartado</option>
                        </select>
                    </div>
                    <button onclick="excluir()" class="text-xs px-4 py-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg transition-colors font-medium">
                        Excluir permanente
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let leads = [];
let currentId = null;
let filtroAtual = '';

const STATUS_LABELS = {
  NOVO: 'Novo', CONTATADO: 'Contatado', FECHADO: 'Fechado', DESCARTADO: 'Descartado'
};
const STATUS_CLASS = {
  NOVO: 's-novo', CONTATADO: 's-contatado', FECHADO: 's-fechado', DESCARTADO: 's-descartado'
};

async function carregar() {
  const url = filtroAtual ? `/api/contatos?status=${filtroAtual}` : '/api/contatos';
  const r = await fetch(url);
  leads = await r.json();
  renderTabela();
}

function renderTabela() {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty-state');
  document.getElementById('total-badge').textContent = leads.length + ' registro(s)';

  if (!leads.length) {
    tbody.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  tbody.innerHTML = leads.map(l => `
    <tr class="border-b border-slate-100 hover:bg-slate-50 cursor-pointer" onclick="abrirModal(${l.id})">
      <td class="px-5 py-3">
        <p class="font-semibold text-slate-800">${esc(l.nome)}</p>
        <p class="text-slate-400 text-xs">${esc(l.email)}</p>
        ${l.telefone ? `<p class="text-slate-400 text-xs">${esc(l.telefone)}</p>` : ''}
      </td>
      <td class="px-5 py-3 text-slate-500">${esc(l.empresa || '—')}</td>
      <td class="px-5 py-3 text-slate-500">${esc(l.plano_interesse || '—')}</td>
      <td class="px-5 py-3 text-slate-400 text-xs whitespace-nowrap">${esc(l.criado_em)}</td>
      <td class="px-5 py-3">
        <span class="status-badge ${STATUS_CLASS[l.status] || ''}">${STATUS_LABELS[l.status] || l.status}</span>
      </td>
      <td class="px-5 py-3 text-right">
        <button onclick="event.stopPropagation(); abrirModal(${l.id})" class="text-blue-500 hover:text-blue-700">
          <i data-lucide="eye" class="w-4 h-4"></i>
        </button>
      </td>
    </tr>
  `).join('');
  lucide.createIcons();
}

function abrirModal(id) {
  const l = leads.find(x => x.id === id);
  if (!l) return;
  currentId = id;

  document.getElementById('modal-body').innerHTML = `
    <div class="grid grid-cols-2 gap-x-6 gap-y-3">
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Nome</p><p class="font-medium">${esc(l.nome)}</p></div>
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">E-mail</p><p>${esc(l.email)}</p></div>
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Telefone</p><p>${esc(l.telefone || '—')}</p></div>
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Empresa</p><p>${esc(l.empresa || '—')}</p></div>
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Plano de interesse</p><p>${esc(l.plano_interesse || '—')}</p></div>
      <div><p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Recebido em</p><p>${esc(l.criado_em)}</p></div>
    </div>
    ${l.mensagem ? `
    <div class="mt-1">
      <p class="text-xs text-slate-400 font-semibold uppercase tracking-wide mb-1">Mensagem</p>
      <p class="bg-slate-50 rounded-lg p-3 text-slate-600 leading-relaxed">${esc(l.mensagem)}</p>
    </div>` : ''}
  `;

  document.getElementById('modal-status').value = l.status;
  document.getElementById('modal').classList.remove('hidden');
  lucide.createIcons();
}

function closeModal() {
  document.getElementById('modal').classList.add('hidden');
  currentId = null;
}

async function salvarStatus() {
  if (!currentId) return;
  const status = document.getElementById('modal-status').value;
  const r = await fetch(`/api/contatos/${currentId}`, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ status })
  });
  const d = await r.json();
  if (d.ok) {
    showToast('Status atualizado');
    closeModal();
    await carregar();
  } else {
    showToast('Erro ao atualizar', 'error');
  }
}

async function excluir() {
  if (!currentId || !confirm('Excluir este contato permanentemente?')) return;
  const r = await fetch(`/api/contatos/${currentId}`, { method: 'DELETE' });
  const d = await r.json();
  if (d.ok) {
    showToast('Contato excluído');
    closeModal();
    await carregar();
  } else {
    showToast('Erro ao excluir', 'error');
  }
}

function filtrar(status) {
  filtroAtual = status;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('active'));
  const map = { '': 'f-todos', 'NOVO': 'f-novo', 'CONTATADO': 'f-contatado', 'FECHADO': 'f-fechado', 'DESCARTADO': 'f-descartado' };
  document.getElementById(map[status])?.classList.add('active');
  carregar();
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Fechar modal clicando fora
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

carregar();
</script>
{% endblock %}
