{% extends "sa_base.html" %}

{% block title %}Planos{% endblock %}
{% block header_title %}Gerenciar Planos e Limites{% endblock %}

{% block content %}
<div class="flex justify-between items-center mb-6">
    <div class="max-w-md w-full relative">
        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
        <input type="text" id="filtro-nome" placeholder="Buscar planos..." class="w-full pl-10 pr-4 py-2 bg-white border border-slate-200 rounded-xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none transition-all text-sm" onkeyup="renderTable()">
    </div>
    <button onclick="abrirModal()" class="flex items-center px-4 py-2 bg-slate-900 hover:bg-slate-800 text-white font-medium rounded-xl shadow-sm transition-all focus:ring-4 focus:ring-slate-200 active:scale-[0.98] text-sm">
        <i data-lucide="plus" class="w-4 h-4 mr-2"></i> Novo Plano
    </button>
</div>

<!-- Planos Grid -->
<div id="grid-planos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="col-span-full py-12 text-center text-slate-500">Carregando planos...</div>
</div>

<!-- Modal Formulário -->
<div id="modal-form" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 hidden items-center justify-center p-4 opacity-0 transition-opacity duration-300">
    <div class="bg-white w-full max-w-md rounded-2xl shadow-2xl scale-95 transition-transform duration-300 transform flex flex-col max-h-[90vh] overflow-hidden" id="modal-content">
        <div class="px-6 py-4 border-b border-slate-100 flex justify-between items-center shrink-0">
            <h3 class="text-lg font-semibold text-slate-800" id="modal-title">Novo Plano</h3>
            <button onclick="fecharModal()" class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded-md hover:bg-slate-100">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="form-plano" class="flex flex-col flex-1 min-h-0" onsubmit="event.preventDefault(); salvarPlano();">
            <input type="hidden" id="plano_id">

            <!-- Campos scrolláveis -->
            <div class="p-6 space-y-4 overflow-y-auto flex-1 min-h-0">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="nome">Nome do Plano</label>
                    <input type="text" id="nome" required class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm" placeholder="Ex: Básico Anual">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="preco_mensal">Valor (R$)</label>
                        <input type="number" step="0.01" id="preco_mensal" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm" placeholder="Ex: 99.90">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1" for="max_usuarios">Max. Usuários</label>
                        <input type="number" id="max_usuarios" value="5" class="w-full px-3 py-2 bg-white border border-slate-300 text-slate-800 rounded-lg focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500 outline-none text-sm">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Módulos Liberados</label>
                    <div id="modulos-grid" class="grid grid-cols-1 sm:grid-cols-2 gap-2 p-4 bg-slate-50 border border-slate-200 rounded-xl max-h-56 overflow-y-auto custom-scroll">
                        <!-- populado js -->
                    </div>
                </div>

                <div class="flex items-center pt-2">
                    <input type="checkbox" id="ativo" class="w-4 h-4 text-blue-600 bg-slate-100 border-slate-300 rounded focus:ring-blue-500 focus:ring-2" checked>
                    <label for="ativo" class="ml-2 text-sm font-medium text-slate-700">Plano Ativo (Visível)</label>
                </div>
            </div>

            <!-- Botões fixos na base — sempre visíveis -->
            <div class="px-6 py-4 flex justify-end gap-3 border-t border-slate-100 shrink-0">
                <button type="button" onclick="fecharModal()" class="px-4 py-2 bg-white border border-slate-300 text-slate-700 font-medium rounded-lg hover:bg-slate-50 transition-colors text-sm">Cancelar</button>
                <button type="submit" class="px-4 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-500 transition-colors shadow-md shadow-blue-500/30 text-sm">Salvar Plano</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let planos = [];
    const MODULE_STRUCTURE = {
        dashboard: { label: 'Dashboard', icon: 'layout-dashboard' },
        pdv: { label: 'PDV / Frente de Caixa', icon: 'shopping-cart' },
        vendas: { label: 'Gestão de Vendas', icon: 'file-text' },
        os: { label: 'Ordens de Serviço', icon: 'wrench' },
        produtos: { label: 'Produtos e Estoque', icon: 'package' },
        clientes: { label: 'Cadastro de Clientes', icon: 'users' },
        financeiro: { 
            label: 'Caixa e Fluxo', icon: 'dollar-sign',
            subs: {
                'financeiro:fluxo': 'Fluxo de Caixa',
                'financeiro:receber': 'Contas a Receber'
            }
        },
        relatorios: { 
            label: 'Relatórios', icon: 'bar-chart-3',
            subs: {
                'relatorios:vendas': 'Relat. Vendas',
                'relatorios:financeiro': 'Relat. Financeiro',
                'relatorios:estoque': 'Relat. Estoque'
            }
        },
        settings: { 
            label: 'Configurações', icon: 'settings',
            subs: {
                'settings:geral': 'Loja/Dados',
                'settings:vendedores': 'Vendedores',
                'settings:maquininhas': 'Maquininhas',
                'settings:usuarios': 'Usuários',
                'settings:contas': 'Contas Bancárias'
            }
        }
    };

    document.addEventListener("DOMContentLoaded", () => { carregarDados(); });

    async function carregarDados() {
        try {
            const res = await fetch('/api/planos');
            planos = await res.json();
            
            // Inicializa grid de módulos
            const grid = document.getElementById('modulos-grid');
            let html = '';
            
            for (const [id, info] of Object.entries(MODULE_STRUCTURE)) {
                html += `
                <div class="col-span-1 sm:col-span-2 mt-2 first:mt-0">
                    <label class="flex items-center p-2 rounded-lg border border-slate-200 bg-white hover:border-blue-400 cursor-pointer transition-all group">
                        <input type="checkbox" name="module-item" value="${id}" class="w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500" onchange="toggleSubs(this, '${id}')">
                        <div class="ml-3 flex items-center">
                            <i data-lucide="${info.icon}" class="w-4 h-4 text-slate-400 group-hover:text-blue-500 mr-2"></i>
                            <span class="text-xs font-bold text-slate-800">${info.label}</span>
                        </div>
                    </label>
                    ${info.subs ? `
                    <div class="ml-8 mt-1 grid grid-cols-1 sm:grid-cols-2 gap-1" id="subs-${id}">
                        ${Object.entries(info.subs).map(([subId, subLabel]) => `
                            <label class="flex items-center p-1.5 rounded-md hover:bg-slate-100 cursor-pointer transition-colors">
                                <input type="checkbox" name="module-item" value="${subId}" data-parent="${id}" class="w-3.5 h-3.5 text-blue-500 rounded border-slate-300">
                                <span class="ml-2 text-[11px] text-slate-600">${subLabel}</span>
                            </label>
                        `).join('')}
                    </div>
                    ` : ''}
                </div>`;
            }
            grid.innerHTML = html;
            
            lucide.createIcons();
            renderTable();
        } catch (e) {
            console.error(e);
            showToast('Erro ao carregar planos', 'error');
        }
    }

    function toggleSubs(el, moduleId) {
        const container = document.getElementById(`subs-${moduleId}`);
        if (!container) return;
        const checkboxes = container.querySelectorAll('input[type="checkbox"]');
        checkboxes.forEach(cb => cb.checked = el.checked);
    }

    function renderTable() {
        const grid = document.getElementById('grid-planos');
        const q = document.getElementById('filtro-nome').value.toLowerCase();
        
        const views = planos.filter(l => l.nome.toLowerCase().includes(q));
        
        if(views.length === 0) {
            grid.innerHTML = `<div class="col-span-full py-12 text-center text-slate-500">Nenhum plano encontrado.</div>`;
            return;
        }

        // Helper para pegar labels formatados
        const getLabel = (mId) => {
            if (MODULE_STRUCTURE[mId]) return MODULE_STRUCTURE[mId].label;
            const parentId = mId.split(':')[0];
            if (MODULE_STRUCTURE[parentId]?.subs?.[mId]) return MODULE_STRUCTURE[parentId].subs[mId];
            return mId;
        };

        grid.innerHTML = views.map(p => {
            const modulosList = p.modulos.split(',').map(m => m.trim()).filter(m => m);
            // Filtra apenas módulos principais para a lista principal
            const mainModules = modulosList.filter(m => !m.includes(':')).map(getLabel);

            return `
            <div class="bg-white border ${p.ativo ? 'border-amber-200' : 'border-slate-200 opacity-75'} rounded-2xl p-6 shadow-sm hover:shadow-md transition-shadow relative group">
                ${!p.ativo ? '<div class="absolute top-4 right-4 bg-slate-100 text-slate-500 text-[10px] px-2 py-1 rounded font-bold tracking-widest uppercase">Inativo</div>' : ''}
                
                <div class="flex items-center justify-between mb-4">
                    <h4 class="font-bold text-lg text-slate-800">${p.nome}</h4>
                    <span class="text-2xl font-black text-slate-900">R$ ${p.preco_mensal.toFixed(2)}<span class="text-sm font-medium text-slate-500">/mês</span></span>
                </div>
                
                <ul class="space-y-3 mb-8">
                    <li class="flex items-center text-sm text-slate-600">
                        <i data-lucide="users" class="w-4 h-4 text-blue-500 mr-2 shrink-0"></i>
                        Até <strong>${p.max_usuarios}</strong> usuários inclusos
                    </li>
                    <li class="flex items-start text-sm text-slate-600">
                        <i data-lucide="blocks" class="w-4 h-4 text-emerald-500 mr-2 mt-0.5 shrink-0"></i>
                        <span class="leading-tight">Módulos: <br>
                            <span class="text-xs text-slate-500">
                                ${mainModules.join(', ')}
                            </span>
                        </span>
                    </li>
                </ul>
                
                <div class="flex justify-end pt-4 border-t border-slate-100">
                    <button onclick='editar(${JSON.stringify(p).replace(/'/g, "&#39;")})' class="text-sm font-medium text-blue-600 hover:text-blue-800 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors flex items-center">
                        <i data-lucide="edit-3" class="w-4 h-4 mr-1"></i> Editar Plano
                    </button>
                </div>
            </div>`;
        }).join('');
        lucide.createIcons();
    }

    // Modal behavior
    const modal = document.getElementById('modal-form');
    const modalContent = document.getElementById('modal-content');
    
    function abrirModal() {
        document.getElementById('form-plano').reset();
        document.getElementById('plano_id').value = '';
        document.getElementById('modal-title').textContent = 'Novo Plano';
        document.getElementById('ativo').checked = true;
        
        // Reset checkboxes
        document.querySelectorAll('input[name="module-item"]').forEach(cb => cb.checked = false);
        
        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
        }, 10);
    }

    function fecharModal() {
        modal.classList.add('opacity-0');
        modalContent.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }, 300);
    }

    function editar(p) {
        document.getElementById('plano_id').value = p.id;
        document.getElementById('nome').value = p.nome;
        document.getElementById('preco_mensal').value = p.preco_mensal;
        document.getElementById('max_usuarios').value = p.max_usuarios;
        document.getElementById('ativo').checked = p.ativo;
        document.getElementById('modal-title').textContent = 'Editar Plano';
        
        // Set checkboxes
        const modulosAtivos = p.modulos.split(',').map(m => m.trim());
        document.querySelectorAll('input[name="module-item"]').forEach(cb => {
            cb.checked = modulosAtivos.includes(cb.value);
        });

        modal.classList.remove('hidden');
        modal.classList.add('flex');
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
        }, 10);
    }

    async function salvarPlano() {
        const id = document.getElementById('plano_id').value;
        
        // Coleta módulos selecionados
        const selectedModules = Array.from(document.querySelectorAll('input[name="module-item"]:checked'))
                                     .map(cb => cb.value)
                                     .join(',');

        if (!selectedModules) {
            showToast('Selecione ao menos um módulo', 'warning');
            return;
        }

        const d = {
            nome: document.getElementById('nome').value,
            preco_mensal: parseFloat(document.getElementById('preco_mensal').value || 0),
            max_usuarios: parseInt(document.getElementById('max_usuarios').value || 1),
            modulos: selectedModules,
            ativo: document.getElementById('ativo').checked
        };

        const url = id ? `/api/planos/${id}` : '/api/planos';
        const method = id ? 'PUT' : 'POST';

        try {
            const res = await fetch(url, {
                method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(d)
            });

            if(res.ok) {
                showToast(id ? 'Plano atualizado!' : 'Plano criado!');
                fecharModal();
                carregarDados();
            } else {
                showToast('Erro ao salvar plano', 'error');
            }
        } catch (e) {
            showToast('Erro de conexão', 'error');
        }
    }
</script>
{% endblock %}
