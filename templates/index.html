<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LojaUp</title>
  <link rel="shortcut icon" href="{{ url_for('static', filename='img/favicon.ico') }}" type="image/x-icon">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app-styles.css') }}">
</head>

<body>
  <div id="nav-progress"></div>
  <div id="mobile-backdrop" onclick="toggleMobileMenu()"></div>
  <div id="app">
    <!-- SIDEBAR -->
    <div id="sidebar">
      <div id="nav-rail"></div>
      <div id="sidebar-header">
        <img id="sidebar-logo" src="/static/img/logo.png" class="logo-icon" alt="Logo" onerror="this.onerror=null;this.src='/static/img/logo.png'">
        <div class="logo-text">
          <div id="sidebar-shop-name">Carregando...</div>
          <div class="logo-sub">v1.0</div>
        </div>
      </div>
      <nav id="nav" class="hidden-scroll">
        <div class="nav-title">Principal</div>
        <div class="nav-item active" onclick="navigate('dashboard')" data-page="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          <span class="nav-label">Dashboard</span>
        </div>

        <div class="nav-title">Operacional</div>
        <div class="nav-item" onclick="navigate('pdv')" data-page="pdv">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1" />
            <circle cx="20" cy="21" r="1" />
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6" />
          </svg>
          <span class="nav-label">Ponto de Venda</span>
        </div>
        <div class="nav-item" onclick="navigate('vendas')" data-page="vendas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
            <polyline points="14,2 14,8 20,8" />
            <line x1="16" y1="13" x2="8" y2="13" />
            <line x1="16" y1="17" x2="8" y2="17" />
          </svg>
          <span class="nav-label">Vendas</span>
        </div>
        <div class="nav-item" onclick="navigate('os')" data-page="os">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path
              d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z" />
          </svg>
          <span class="nav-label">Serviços (O.S)</span>
        </div>

        <div class="nav-title">Catálogos</div>
        <div class="nav-item" onclick="navigate('produtos')" data-page="produtos">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z" />
            <line x1="3" y1="6" x2="21" y2="6" />
            <path d="M16 10a4 4 0 0 1-8 0" />
          </svg>
          <span class="nav-label">Produtos</span>
        </div>
        <div class="nav-item" onclick="navigate('clientes')" data-page="clientes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          <span class="nav-label">Clientes</span>
        </div>

        <div class="nav-title">Financeiro</div>
        <div class="nav-item" onclick="navigate('financeiro')" data-page="financeiro">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="1" x2="12" y2="23" />
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
          </svg>
          <span class="nav-label">Caixa & Fluxo</span>
        </div>
        <div class="nav-item" onclick="navigate('relatorios')" data-page="relatorios">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="22,12 18,12 15,21 9,3 6,12 2,12" />
          </svg>
          <span class="nav-label">Relatórios</span>
        </div>

        <div id="nav-section-gestao" style="display:none">
          <div class="nav-title">Gestão</div>
          <div class="nav-item" onclick="navigate('settings')" data-page="settings" id="nav-settings">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z" />
            </svg>
            <span class="nav-label">Configurações</span>
          </div>
        </div>
      </nav>

      <!-- User info at bottom -->
      <div id="sidebar-user">
        <div class="user-avatar" id="user-avatar-init">A</div>
        <div class="user-info">
          <div class="user-name" id="user-display-name">Carregando...</div>
          <div class="user-role" id="user-display-role">—</div>
        </div>
        <div class="user-actions">
          <button class="icon-btn" title="Alterar senha" onclick="showChangePassword()">🔑</button>
          <button class="icon-btn danger" title="Sair" onclick="doLogout()">⏻</button>
        </div>
      </div>

      <div id="collapse-btn" onclick="toggleSidebar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15,18 9,12 15,6" />
        </svg>
        <span class="nav-label" style="font-size:12px">Recolher</span>
      </div>
    </div>

    <!-- MAIN -->
    <div id="main">
      <div id="topbar">
        <div id="mobile-menu-btn" onclick="toggleMobileMenu()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </div>
        <div id="page-title">Dashboard</div>
        <div id="topbar-actions"></div>
        <div id="clock"></div>
      </div>
      <div id="content"></div>
    </div>
  </div>

  <!-- MODAL -->
  <div id="modal-overlay" onclick="modalClickOutside(event)">
    <div class="modal modal-md" id="modal-box">
      <div class="modal-header">
        <span id="modal-title"></span>
        <div class="modal-close" onclick="closeModal()">✕</div>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

  <div id="notif"></div>

  <script src="{{ url_for('static', filename='js/app-main.js') }}"></script>
</body>

</html>
