<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GestãoLoja — Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2235;
  --border:#1e2d45;--text:#e2eaf5;--text2:#8899b4;
  --blue:#3b82f6;--blue2:#60a5fa;--green:#22c55e;--red:#ef4444;
}
body{
  min-height:100vh;background:var(--bg);
  font-family:'Sora',sans-serif;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
}

/* ── Background grid ── */
body::before{
  content:'';position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(59,130,246,.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,.04) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

/* ── Glow orbs ── */
.orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;opacity:.35}
.orb1{width:500px;height:500px;background:radial-gradient(circle,#1d4ed8,transparent);top:-100px;left:-100px}
.orb2{width:400px;height:400px;background:radial-gradient(circle,#0f766e,transparent);bottom:-80px;right:-60px}
.orb3{width:300px;height:300px;background:radial-gradient(circle,#7c3aed,transparent);top:50%;left:50%;transform:translate(-50%,-50%)}

/* ── Card ── */
.login-wrap{
  position:relative;z-index:10;
  width:100%;max-width:420px;
  padding:20px;
}

.login-card{
  background:rgba(17,24,39,.85);
  border:1px solid var(--border);
  border-radius:20px;
  padding:40px 36px 36px;
  backdrop-filter:blur(20px);
  box-shadow:
    0 0 0 1px rgba(59,130,246,.1),
    0 32px 64px rgba(0,0,0,.5),
    inset 0 1px 0 rgba(255,255,255,.05);
}

/* ── Logo ── */
.logo{text-align:center;margin-bottom:32px}
.logo-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:64px;height:64px;
  background:linear-gradient(135deg,#1d4ed8,#7c3aed);
  border-radius:16px;
  font-size:28px;
  margin-bottom:14px;
  box-shadow:0 8px 24px rgba(29,78,216,.4);
  position:relative;
}
.logo-icon::after{
  content:'';position:absolute;inset:-1px;border-radius:17px;
  background:linear-gradient(135deg,rgba(255,255,255,.2),transparent);
  pointer-events:none;
}
.logo-title{
  font-size:22px;font-weight:800;letter-spacing:-.02em;
  background:linear-gradient(135deg,#e2eaf5,#93c5fd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.logo-sub{font-size:12px;color:var(--text2);margin-top:4px;font-weight:400}

/* ── Form ── */
.form-group{margin-bottom:18px}
.form-group label{
  display:block;font-size:12px;font-weight:600;
  color:var(--text2);text-transform:uppercase;letter-spacing:.06em;
  margin-bottom:7px;
}
.input-wrap{position:relative}
.input-icon{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  font-size:15px;pointer-events:none;opacity:.6;
}
.form-group input{
  width:100%;background:rgba(255,255,255,.04);
  border:1px solid var(--border);
  color:var(--text);padding:11px 12px 11px 38px;
  border-radius:10px;font-family:'Sora',sans-serif;font-size:14px;
  outline:none;transition:all .2s;
}
.form-group input:focus{
  border-color:var(--blue);
  background:rgba(59,130,246,.06);
  box-shadow:0 0 0 3px rgba(59,130,246,.15);
}
.form-group input::placeholder{color:var(--text2);opacity:.6}

/* ── Error ── */
.error-msg{
  display:none;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
  color:#fca5a5;border-radius:8px;padding:10px 14px;font-size:13px;
  margin-bottom:18px;text-align:center;
}
.error-msg.show{display:block}

/* ── Button ── */
.btn-login{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff;font-family:'Sora',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:.02em;
  box-shadow:0 4px 16px rgba(29,78,216,.35);
  position:relative;overflow:hidden;
}
.btn-login::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);
  border-radius:10px;
}
.btn-login:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(29,78,216,.45)}
.btn-login:active{transform:translateY(0)}
.btn-login:disabled{opacity:.6;cursor:not-allowed;transform:none}

/* ── Loading spinner ── */
.spinner{
  display:inline-block;width:16px;height:16px;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fff;border-radius:50%;
  animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Footer hint ── */
.login-hint{
  text-align:center;margin-top:20px;
  font-size:11px;color:var(--text2);opacity:.5;
}
.login-hint kbd{
  background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);
  border-radius:4px;padding:1px 5px;font-family:'JetBrains Mono',monospace;
  font-size:11px;
}

/* ── Divider ── */
.divider{height:1px;background:var(--border);margin:24px 0;position:relative}
.divider::after{
  content:'Sistema de Gestão';position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:rgba(17,24,39,.95);padding:0 10px;
  font-size:10px;color:var(--text2);letter-spacing:.08em;text-transform:uppercase;
}

/* ── Fade in ── */
.login-card{animation:fadeUp .4s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div class="login-wrap">
  <div class="login-card">
    <div class="logo">
      <div class="logo-icon">🏪</div>
      <div class="logo-title">GestãoLoja</div>
      <div class="logo-sub">Sistema de Gestão Comercial</div>
    </div>

    <div class="divider"></div>

    <div class="error-msg" id="err-msg">Login ou senha incorretos</div>

    <div class="form-group">
      <label>Usuário</label>
      <div class="input-wrap">
        <span class="input-icon">👤</span>
        <input type="text" id="inp-login" placeholder="Digite seu login"
               autocomplete="username" autofocus>
      </div>
    </div>

    <div class="form-group">
      <label>Senha</label>
      <div class="input-wrap">
        <span class="input-icon">🔒</span>
        <input type="password" id="inp-senha" placeholder="Digite sua senha"
               autocomplete="current-password">
      </div>
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">
      Entrar no Sistema
    </button>

    <div class="login-hint">
      Acesso inicial: <kbd>admin</kbd> / <kbd>admin123</kbd>
    </div>
  </div>
</div>

<script>
document.getElementById('inp-senha').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('inp-login').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('inp-senha').focus();
});

async function doLogin() {
  const btn  = document.getElementById('btn-login');
  const err  = document.getElementById('err-msg');
  const login = document.getElementById('inp-login').value.trim();
  const senha = document.getElementById('inp-senha').value;

  if (!login || !senha) {
    showErr('Preencha login e senha');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Entrando...';
  err.classList.remove('show');

  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({login, senha})
    });
    const d = await r.json();

    if (d.ok) {
      btn.innerHTML = '✅ Bem-vindo, ' + d.nome + '!';
      btn.style.background = 'linear-gradient(135deg,#166534,#16a34a)';
      setTimeout(() => window.location.href = '/', 600);
    } else {
      showErr(d.message || 'Login ou senha incorretos');
      btn.disabled = false;
      btn.innerHTML = 'Entrar no Sistema';
    }
  } catch(e) {
    showErr('Erro de conexão com o servidor');
    btn.disabled = false;
    btn.innerHTML = 'Entrar no Sistema';
  }
}

function showErr(msg) {
  const el = document.getElementById('err-msg');
  el.textContent = msg;
  el.classList.add('show');
  document.getElementById('inp-senha').value = '';
  document.getElementById('inp-senha').focus();
}
</script>
</body>
</html>
