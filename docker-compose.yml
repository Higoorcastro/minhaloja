version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: minhaloja_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: superadmin_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - minhaloja_net

  app:
    build: .
    container_name: minhaloja_app
    environment:
      - APP_TYPE=loja
      - DB_URL=postgresql://postgres:postgrespassword@db:5432/superadmin_db
      - SECRET_KEY=sua_chave_secreta_aqui
    ports:
      - "5678:5678"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - minhaloja_net

  admin:
    build: .
    container_name: minhaloja_admin
    environment:
      - APP_TYPE=admin
      - DB_URL=postgresql://postgres:postgrespassword@db:5432/superadmin_db
      - SECRET_KEY=sua_chave_secreta_aqui
    ports:
      - "5679:5679"
    depends_on:
      - db
    restart: unless-stopped
    networks:
      - minhaloja_net

volumes:
  postgres_data:

networks:
  minhaloja_net:
    driver: bridge
