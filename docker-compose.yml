services:
  db:
    image: postgres:15-alpine
    container_name: lojaup_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - lojaup_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: lojaup_app
    environment:
      - APP_TYPE=loja
      - FLASK_DEBUG=0
      - DB_URL=${DB_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    ports:
      - "5678:5678"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lojaup_net

  admin:
    build: .
    container_name: lojaup_admin
    environment:
      - APP_TYPE=admin
      - FLASK_DEBUG=0
      - DB_URL=${DB_URL}
      - SECRET_KEY=${SECRET_KEY}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-false}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
      - GUNICORN_TIMEOUT=${GUNICORN_TIMEOUT:-120}
    ports:
      - "5679:5679"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - lojaup_net

  landing:
    image: nginx:alpine
    container_name: lojaup_landing
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    ports:
      - "5680:80"
    restart: unless-stopped
    networks:
      - lojaup_net

volumes:
  postgres_data:

networks:
  lojaup_net:
    driver: bridge
